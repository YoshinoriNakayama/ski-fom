<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SKI FORM ANALYZER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#080a0e;--surface:#0f1117;--border:#1a1f2e;
  --accent:#00d4ff;--accent2:#ff3c6e;--accent3:#f5a623;
  --text:#dde2ef;--muted:#3d4560;--panel:#0c0e15;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:rgba(8,10,14,.97);position:sticky;top:0;z-index:200;
}
.logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;
  background:linear-gradient(90deg,var(--accent),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo span{background:linear-gradient(90deg,var(--accent2),#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.mode-tabs{display:flex;gap:3px;background:var(--surface);padding:3px;border-radius:7px;border:1px solid var(--border);}
.mode-tab{padding:5px 10px;border:none;background:transparent;color:var(--muted);
  font-size:10px;cursor:pointer;border-radius:4px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.mode-tab.active{background:var(--accent);color:#000;font-weight:700;}

.main{padding:10px;display:flex;flex-direction:column;gap:8px;}

/* ── TOP: videos + dial ── */
.top{display:flex;gap:6px;align-items:flex-start;}

/* Video pair */
.vpair{flex:1;min-width:0;display:flex;gap:4px;}
.vcol{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}

/* File select — identical pattern to working test page */
.pick{
  display:block;width:100%;padding:10px 6px;
  text-align:center;font-size:12px;font-family:'Share Tech Mono',monospace;
  border-radius:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.pick input[type=file]{display:none;}
.pick-pro{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid var(--accent);}
.pick-you{background:rgba(255,60,110,.15);color:var(--accent2);border:1px solid var(--accent2);}

/* Video box */
.vbox{
  width:100%;aspect-ratio:9/16;
  background:#040506;border:1px solid var(--border);border-radius:6px;
  position:relative;overflow:hidden;
}
.vbox video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;
}
.vph{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;color:var(--muted);
}
.vph.hidden{display:none;}
.vph-icon{font-size:22px;opacity:.3;}
.vph-txt{font-size:9px;opacity:.5;}

/* tap-to-play */
.tapov{
  position:absolute;inset:0;z-index:8;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:rgba(0,0,0,.5);cursor:pointer;
}
.tapov.hidden{display:none;}
.tap-circle{width:44px;height:44px;border-radius:50%;background:rgba(0,212,255,.2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);}
.tap-txt{font-size:8px;color:var(--accent);text-align:center;line-height:1.5;}

/* Overlay */
.ovwrap{flex:1;min-width:0;display:none;flex-direction:column;gap:4px;}
.ovwrap.active{display:flex;}
.ovlbl{font-size:9px;color:var(--muted);text-align:center;}
.ovbox{
  width:100%;aspect-ratio:9/16;
  background:#040506;border:1px solid var(--border);border-radius:6px;
  position:relative;overflow:hidden;touch-action:none;
}
.ovbox canvas{position:absolute;inset:0;width:100%;height:100%;transform-origin:0 0;}
.ov-badge{position:absolute;top:5px;left:5px;z-index:20;font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.7);border:1px solid var(--accent);color:var(--accent);pointer-events:none;}
.zoom-badge{position:absolute;top:5px;right:5px;z-index:20;font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.7);border:1px solid var(--accent3);color:var(--accent3);pointer-events:none;display:none;}
.zoom-badge.v{display:block;}
.zoom-rst{position:absolute;bottom:6px;right:6px;z-index:20;background:rgba(0,0,0,.7);border:1px solid var(--muted);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;cursor:pointer;display:none;}
.zoom-rst.v{display:block;}

/* DIAL */
.dial-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:68px;}
.dlbl{font-size:7px;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.4;}
.dwrap{position:relative;width:60px;height:60px;user-select:none;touch-action:none;}
.d-outer{position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(from 0deg,#1c2438 0deg 5deg,#232d45 5deg 10deg);border:2px solid #28344e;box-shadow:0 0 12px rgba(0,0,0,.9);cursor:grab;}
.d-outer:active{cursor:grabbing;}
.d-plate{position:absolute;inset:10px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#2a3550,#10162a 100%);border:1px solid #1e2a42;z-index:2;}
.d-center{position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:rgba(0,212,255,.3);border:1px solid rgba(0,212,255,.5);transform:translate(-50%,-50%);z-index:5;pointer-events:none;}
.dnum{font-size:12px;color:var(--accent);letter-spacing:1px;text-shadow:0 0 6px rgba(0,212,255,.5);}
.dlbl2{font-size:7px;color:var(--muted);letter-spacing:2px;}
.dhint{font-size:7px;color:var(--muted);text-align:center;line-height:1.7;}

/* Controls */
.ctrl{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px;}
.crow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.clbl{font-size:9px;color:var(--muted);text-transform:uppercase;min-width:36px;}
.btn{padding:8px 11px;border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;border-radius:6px;
  white-space:nowrap;user-select:none;-webkit-tap-highlight-color:transparent;}
.btn.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.btn-p{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.srow{display:flex;align-items:center;gap:6px;width:100%;}
.sbar{flex:1;-webkit-appearance:none;height:5px;background:var(--border);border-radius:3px;outline:none;cursor:pointer;}
.sbar::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent);border-radius:50%;cursor:pointer;}
.tdisp{font-size:10px;color:var(--muted);min-width:76px;text-align:right;}
.spd{display:flex;gap:3px;flex-wrap:wrap;}
.spd-btn{padding:6px 7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);
  font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;border-radius:5px;
  user-select:none;-webkit-tap-highlight-color:transparent;}
.spd-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}
.oprow{display:flex;align-items:center;gap:6px;flex:1;}
.opsbar{flex:1;-webkit-appearance:none;height:5px;background:linear-gradient(to right,rgba(0,212,255,.8),rgba(255,60,110,.8));border-radius:3px;outline:none;cursor:pointer;}
.opsbar::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:#fff;border-radius:50%;cursor:pointer;}
.opval{font-size:10px;color:var(--accent);min-width:26px;}
.ovc{display:none;flex-direction:column;gap:8px;}
.ovc.v{display:flex;}
.sync-ind{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);margin-left:auto;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.sync-dot.on{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nmsg{font-size:9px;color:var(--muted);}
.dvdr{border:none;border-top:1px solid var(--border);}

/* Offset */
.offset-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px;}
.offset-ttl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.orow{display:flex;align-items:center;gap:8px;}
.olbl{font-size:9px;min-width:32px;}
.olbl.pro{color:var(--accent);}
.olbl.you{color:var(--accent2);}
.osbar{flex:1;-webkit-appearance:none;height:5px;background:var(--border);border-radius:3px;outline:none;cursor:pointer;}
.osbar.pro::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent);border-radius:50%;cursor:pointer;}
.osbar.you::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent2);border-radius:50%;cursor:pointer;}
.oval{font-size:9px;color:var(--muted);min-width:40px;text-align:right;}
.ohint{font-size:8px;color:var(--muted);}
</style>
</head>
<body>

<header>
  <div class="logo">SKI<span>FORM</span></div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('split')" id="tab-split">スプリット</button>
    <button class="mode-tab" onclick="setMode('overlay')" id="tab-overlay">オーバーレイ</button>
  </div>
</header>

<div class="main">
  <div class="top">

    <!-- 動画は常にDOMに存在させiOSが再生を止めないようにする -->
    <!-- オーバーレイ時はvisibility:hiddenで非表示（display:noneにしない） -->
    <div class="vpair" id="split-view">
      <div class="vcol" id="pro-col">
        <label class="pick pick-pro">
          📂 PRO
          <input type="file" accept="video/*" id="pro-input">
        </label>
        <div class="vbox">
          <video id="pro-video" playsinline webkit-playsinline controls></video>
          <div class="vph" id="pro-ph">
            <div class="vph-icon">▶</div>
            <div class="vph-txt">PRO動画</div>
          </div>
        </div>
      </div>
      <div class="vcol" id="you-col">
        <label class="pick pick-you">
          📂 YOU
          <input type="file" accept="video/*" id="you-input">
        </label>
        <div class="vbox">
          <video id="you-video" playsinline webkit-playsinline controls></video>
          <div class="vph" id="you-ph">
            <div class="vph-icon">◆</div>
            <div class="vph-txt">自分の動画</div>
          </div>
        </div>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="ovwrap" id="overlay-wrap">
      <div class="ovlbl">◈ OVERLAY</div>
      <div class="ovbox" id="ovbox">
        <canvas id="ov-canvas"></canvas>
        <div class="ov-badge">OVERLAY</div>
        <div class="zoom-badge" id="zoom-badge">×1.0</div>
        <button class="zoom-rst" id="zoom-rst" onclick="resetZoom()">✕ リセット</button>
      </div>
    </div>

    <!-- DIAL -->
    <div class="dial-col">
      <div class="dlbl">コマ送り<br>ダイヤル</div>
      <div class="dwrap">
        <div class="d-outer" id="d-outer"></div>
        <canvas id="d-ticks" width="60" height="60" style="position:absolute;inset:0;pointer-events:none;z-index:1;"></canvas>
        <div class="d-plate"></div>
        <div class="d-center"></div>
        <svg style="position:absolute;inset:0;z-index:6;pointer-events:none;overflow:visible" width="60" height="60">
          <defs><filter id="glow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <line id="needle" x1="30" y1="30" x2="30" y2="9" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
          <circle cx="30" cy="30" r="2.5" fill="var(--accent)" opacity=".9"/>
        </svg>
      </div>
      <div class="dnum" id="dnum">0000</div>
      <div class="dlbl2">FRAME</div>
      <div class="dhint">回転で<br>コマ送り<br>右:進む<br>左:戻る</div>
    </div>

  </div><!-- end top -->

  <!-- OFFSET -->
  <div class="offset-box">
    <div class="offset-ttl">◈ 開始タイミング調整</div>
    <div class="orow">
      <span class="olbl pro">PRO</span>
      <input type="range" class="osbar pro" id="pro-offset" min="0" max="300" value="0" step="0.1" oninput="setOffset('pro',this.value)">
      <span class="oval" id="pro-oval">0.0秒</span>
    </div>
    <div class="orow">
      <span class="olbl you">YOU</span>
      <input type="range" class="osbar you" id="you-offset" min="0" max="300" value="0" step="0.1" oninput="setOffset('you',this.value)">
      <span class="oval" id="you-oval">0.0秒</span>
    </div>
    <div class="ohint">各動画の開始位置を設定 → ▶ 再生でその位置から同時スタート</div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl">
    <div class="crow">
      <span class="clbl">再生</span>
      <button class="btn btn-p" onclick="playAll()" id="btn-play">▶ 再生</button>
      <button class="btn" onclick="pauseAll()">⏸ 停止</button>
      <button class="btn" onclick="resetAll()">⏮ リセット</button>
      <div class="sync-ind"><div class="sync-dot" id="sync-dot"></div><span id="sync-lbl">SYNC OFF</span></div>
    </div>
    <div class="srow">
      <span class="clbl">位置</span>
      <input type="range" class="sbar" id="seekbar" min="0" max="10000" value="0" oninput="seekTo(this.value)">
      <span class="tdisp" id="tdisp">0:00 / 0:00</span>
    </div>
    <div class="crow">
      <span class="clbl">速度</span>
      <div class="spd">
        <button class="spd-btn" onclick="setSpeed(0.125)">×1/8</button>
        <button class="spd-btn" onclick="setSpeed(0.25)">×1/4</button>
        <button class="spd-btn" onclick="setSpeed(0.5)">×1/2</button>
        <button class="spd-btn on" onclick="setSpeed(1.0)">×1</button>
        <button class="spd-btn" onclick="setSpeed(2.0)">×2</button>
      </div>
    </div>
    <div class="crow">
      <span class="clbl">同期</span>
      <button class="btn" id="btn-sync" onclick="toggleSync()">同期 OFF</button>
      <span class="nmsg" id="sync-hint">（2本読み込むと有効）</span>
    </div>
    <div class="ovc" id="ovc">
      <hr class="dvdr">
      <div class="crow">
        <span class="clbl">透過</span>
        <div class="oprow">
          <span style="font-size:9px;color:var(--accent)">PRO</span>
          <input type="range" class="opsbar" id="opsbar" min="0" max="100" value="50" oninput="setOpacity(this.value)">
          <span style="font-size:9px;color:var(--accent2)">YOU</span>
          <span class="opval" id="opval">50%</span>
        </div>
      </div>
      <div style="font-size:8px;color:var(--muted);">🔍 ピンチ/スクロール=ズーム　ドラッグ=パン</div>
    </div>
  </div>

</div>

<script>
const PV = document.getElementById('pro-video');
const YV = document.getElementById('you-video');
const seekbar = document.getElementById('seekbar');
const tdisp = document.getElementById('tdisp');
const ovc = document.getElementById('ov-canvas');
const octx = ovc.getContext('2d');
const ovbox = document.getElementById('ovbox');

let mode='split', ovOp=0.5, ovRAF=null;
let proOK=false, youOK=false, syncOn=false, seekDrag=false;
let proOff=0, youOff=0;
const FPS=30;

// Dial ticks
(function(){
  const tc=document.getElementById('d-ticks'),cx=tc.getContext('2d'),r=27;
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2-Math.PI/2,maj=i%5===0,l=maj?5:3;
    cx.beginPath();cx.moveTo(30+Math.cos(a)*r,30+Math.sin(a)*r);
    cx.lineTo(30+Math.cos(a)*(r-l),30+Math.sin(a)*(r-l));
    cx.strokeStyle=maj?'rgba(0,212,255,.5)':'rgba(100,120,160,.3)';cx.lineWidth=maj?1.5:1;cx.stroke();
  }
})();

// Zoom/pan
let zoom=1,ppx=0,ppy=0,pan=false,psx=0,psy=0,popx=0,popy=0,lpd=null;
function applyTX(){
  const cw=ovbox.clientWidth,ch=ovbox.clientHeight;
  ovc.style.transform=`translate(${(cw/2)*(1-zoom)+ppx}px,${(ch/2)*(1-zoom)+ppy}px) scale(${zoom})`;
  const zb=document.getElementById('zoom-badge'),zr=document.getElementById('zoom-rst');
  if(zoom>1.01){zb.textContent=`×${zoom.toFixed(1)}`;zb.classList.add('v');zr.classList.add('v');}
  else{zb.classList.remove('v');zr.classList.remove('v');}
}
function clampP(){
  const cw=ovbox.clientWidth,ch=ovbox.clientHeight;
  ppx=Math.max(-(cw*(zoom-1)/2),Math.min(cw*(zoom-1)/2,ppx));
  ppy=Math.max(-(ch*(zoom-1)/2),Math.min(ch*(zoom-1)/2,ppy));
}
function resetZoom(){zoom=1;ppx=0;ppy=0;applyTX();}
ovbox.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(1,Math.min(8,zoom*(e.deltaY<0?1.12:1/1.12)));clampP();applyTX();},{passive:false});
ovbox.addEventListener('mousedown',e=>{if(zoom<=1)return;pan=true;psx=e.clientX;psy=e.clientY;popx=ppx;popy=ppy;});
window.addEventListener('mousemove',e=>{if(!pan)return;ppx=popx+(e.clientX-psx);ppy=popy+(e.clientY-psy);clampP();applyTX();});
window.addEventListener('mouseup',()=>{pan=false;});
ovbox.addEventListener('touchstart',e=>{
  if(e.touches.length===2)lpd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  else if(e.touches.length===1&&zoom>1){pan=true;psx=e.touches[0].clientX;psy=e.touches[0].clientY;popx=ppx;popy=ppy;}
},{passive:true});
ovbox.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lpd){zoom=Math.max(1,Math.min(8,zoom*(d/lpd)));clampP();applyTX();}lpd=d;}
  else if(e.touches.length===1&&pan){ppx=popx+(e.touches[0].clientX-psx);ppy=popy+(e.touches[0].clientY-psy);clampP();applyTX();}
},{passive:false});
ovbox.addEventListener('touchend',e=>{if(e.touches.length<2)lpd=null;if(e.touches.length===0)pan=false;});

// ── Load video (same as working test page) ──
document.getElementById('pro-input').addEventListener('change',function(){
  const file=this.files[0]; if(!file)return;
  const url=URL.createObjectURL(file);
  PV.src=url; PV.load();
  document.getElementById('pro-ph').classList.add('hidden');
  PV.onloadedmetadata=()=>{
    proOK=true;
    document.getElementById('pro-offset').max=Math.floor(PV.duration*10)/10;
    if(proOK&&youOK)document.getElementById('sync-hint').textContent='';
    if(mode==='overlay'&&proOK&&youOK)setupOv();
  };
  PV.ontimeupdate=()=>{if(!seekDrag)updateSeek();};
});

document.getElementById('you-input').addEventListener('change',function(){
  const file=this.files[0]; if(!file)return;
  const url=URL.createObjectURL(file);
  YV.src=url; YV.load();
  document.getElementById('you-ph').classList.add('hidden');
  YV.onloadedmetadata=()=>{
    youOK=true;
    document.getElementById('you-offset').max=Math.floor(YV.duration*10)/10;
    if(proOK&&youOK)document.getElementById('sync-hint').textContent='';
    if(mode==='overlay'&&proOK&&youOK)setupOv();
  };
  YV.ontimeupdate=()=>{if(!seekDrag)updateSeek();};
});

// Offset
function setOffset(w,v){
  const val=parseFloat(v);
  if(w==='pro'){proOff=val;document.getElementById('pro-oval').textContent=val.toFixed(1)+'秒';if(proOK&&PV.paused)PV.currentTime=val;}
  else{youOff=val;document.getElementById('you-oval').textContent=val.toFixed(1)+'秒';if(youOK&&YV.paused)YV.currentTime=val;}
}

// Mode
function setMode(m){
  mode=m;
  document.getElementById('tab-split').classList.toggle('active',m==='split');
  document.getElementById('tab-overlay').classList.toggle('active',m==='overlay');
  // Use visibility (not display:none) so iOS keeps videos alive and playing
  const sv = document.getElementById('split-view');
  sv.style.visibility = m==='split' ? 'visible' : 'hidden';
  sv.style.position    = m==='split' ? 'relative' : 'absolute';
  sv.style.width       = m==='split' ? '' : '0';
  sv.style.overflow    = m==='split' ? '' : 'hidden';
  document.getElementById('overlay-wrap').classList.toggle('active',m==='overlay');
  document.getElementById('ovc').classList.toggle('v',m==='overlay');
  if(m==='overlay'){if(proOK&&youOK)setupOv();startOv();}else stopOv();
}

// Overlay
function setupOv(){
  ovc.width=PV.videoWidth||720;ovc.height=PV.videoHeight||1280;
}
function drawC(v,a){
  if(!v.videoWidth)return;
  octx.globalAlpha=a;
  const cw=ovc.width,ch=ovc.height,vw=v.videoWidth,vh=v.videoHeight;
  const s=Math.min(cw/vw,ch/vh);
  octx.drawImage(v,(cw-vw*s)/2,(ch-vh*s)/2,vw*s,vh*s);
}
function startOv(){
  if(ovRAF)return;
  (function loop(){octx.clearRect(0,0,ovc.width,ovc.height);if(proOK)drawC(PV,ovOp);if(youOK)drawC(YV,1-ovOp);octx.globalAlpha=1;ovRAF=requestAnimationFrame(loop);})();
}
function stopOv(){if(ovRAF){cancelAnimationFrame(ovRAF);ovRAF=null;}}
function setOpacity(v){ovOp=v/100;document.getElementById('opval').textContent=v+'%';}

// Playback
function playAll(){
  const ps=[];
  if(proOK){PV.currentTime=proOff;ps.push(PV.play());}
  if(youOK){YV.currentTime=youOff;ps.push(YV.play());}
  Promise.allSettled(ps).then(()=>document.getElementById('btn-play').textContent='▶ 再生中');
}
function pauseAll(){
  if(proOK)PV.pause();if(youOK)YV.pause();
  document.getElementById('btn-play').textContent='▶ 再生';
}
function resetAll(){
  pauseAll();
  if(proOK)PV.currentTime=proOff;if(youOK)YV.currentTime=youOff;
  seekbar.value=0;updateTimeDisp(0,0);setDial(0);
}

// Seek
function seekTo(v){
  seekDrag=true;
  const r=v/10000;
  if(proOK)PV.currentTime=proOff+(PV.duration-proOff)*r;
  if(youOK)YV.currentTime=youOff+(YV.duration-youOff)*r;
  seekDrag=false;
  const vid=proOK?PV:YV,off=proOK?proOff:youOff;
  if(vid&&vid.duration)setDial((vid.currentTime-off)*FPS);
}
function updateSeek(){
  const vid=proOK?PV:(youOK?YV:null);if(!vid||!vid.duration)return;
  const off=proOK?proOff:youOff,dur=vid.duration-off;
  if(dur<=0)return;
  seekbar.value=Math.max(0,(vid.currentTime-off)/dur)*10000;
  updateTimeDisp(vid.currentTime-off,dur);
  setDial((vid.currentTime-off)*FPS);
}
function updateTimeDisp(c,d){
  const f=s=>`${Math.floor(Math.max(0,s)/60)}:${String(Math.floor(Math.max(0,s)%60)).padStart(2,'0')}`;
  tdisp.textContent=`${f(c)} / ${f(d||0)}`;
}

// Speed
function setSpeed(s){
  if(proOK)PV.playbackRate=s;if(youOK)YV.playbackRate=s;
  const m={'×1/8':0.125,'×1/4':0.25,'×1/2':0.5,'×1':1,'×2':2};
  document.querySelectorAll('.spd-btn').forEach(b=>b.classList.toggle('on',m[b.textContent]===s));
}

// Sync
function toggleSync(){
  if(!proOK||!youOK)return;
  syncOn=!syncOn;
  document.getElementById('btn-sync').textContent=syncOn?'同期 ON':'同期 OFF';
  document.getElementById('btn-sync').classList.toggle('on',syncOn);
  document.getElementById('sync-dot').classList.toggle('on',syncOn);
  document.getElementById('sync-lbl').textContent=syncOn?'SYNC ON':'SYNC OFF';
  if(syncOn){
    const pd=PV.duration-proOff,yd=YV.duration-youOff;
    if(pd>0&&yd>0)YV.currentTime=youOff+yd*((PV.currentTime-proOff)/pd);
    PV.addEventListener('timeupdate',onPTU);
  }else PV.removeEventListener('timeupdate',onPTU);
}
function onPTU(){
  if(!syncOn)return;
  const pd=PV.duration-proOff,yd=YV.duration-youOff;
  if(pd<=0||yd<=0)return;
  const t=youOff+yd*((PV.currentTime-proOff)/pd);
  if(Math.abs(YV.currentTime-t)>0.15)YV.currentTime=t;
  if(PV.paused&&!YV.paused)YV.pause();
  if(!PV.paused&&YV.paused)YV.play().catch(()=>{});
}

// Frame step
function stepFrames(n){
  pauseAll();const dt=n/FPS;
  if(proOK)PV.currentTime=Math.max(proOff,Math.min(PV.duration,PV.currentTime+dt));
  if(youOK)YV.currentTime=Math.max(youOff,Math.min(YV.duration,YV.currentTime+dt));
  updateSeek();
}

// Dial
let dAng=0,dAcc=0,dDrag=false,dLast=0;
const DDEG=5;
function getDA(x,y){const r=document.getElementById('d-outer').getBoundingClientRect();return Math.atan2(y-(r.top+r.height/2),x-(r.left+r.width/2))*180/Math.PI;}
function rotateDial(d){
  dAng+=d;dAcc+=d;const f=Math.trunc(dAcc/DDEG);
  if(f!==0){stepFrames(f);dAcc-=f*DDEG;}
  const nd=document.getElementById('needle'),rad=(dAng-90)*Math.PI/180;
  nd.setAttribute('x2',30+Math.cos(rad)*21);nd.setAttribute('y2',30+Math.sin(rad)*21);
}
function setDial(n){document.getElementById('dnum').textContent=String(Math.round(Math.max(0,n))).padStart(4,'0');}
const dout=document.getElementById('d-outer');
dout.addEventListener('mousedown',e=>{e.preventDefault();dDrag=true;dLast=getDA(e.clientX,e.clientY);dAcc=0;});
window.addEventListener('mousemove',e=>{if(!dDrag)return;const a=getDA(e.clientX,e.clientY);let d=a-dLast;if(d>180)d-=360;if(d<-180)d+=360;dLast=a;rotateDial(d);});
window.addEventListener('mouseup',()=>{dDrag=false;});
dout.addEventListener('touchstart',e=>{e.preventDefault();dDrag=true;dLast=getDA(e.touches[0].clientX,e.touches[0].clientY);dAcc=0;},{passive:false});
window.addEventListener('touchmove',e=>{if(!dDrag)return;const a=getDA(e.touches[0].clientX,e.touches[0].clientY);let d=a-dLast;if(d>180)d-=360;if(d<-180)d+=360;dLast=a;rotateDial(d);},{passive:true});
window.addEventListener('touchend',()=>{dDrag=false;});

// Keyboard
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  if(e.code==='Space'){e.preventDefault();(proOK&&!PV.paused)||(youOK&&!YV.paused)?pauseAll():playAll();}
  if(e.code==='ArrowRight'){e.preventDefault();stepFrames(1);rotateDial(DDEG);}
  if(e.code==='ArrowLeft'){e.preventDefault();stepFrames(-1);rotateDial(-DDEG);}
  if(e.code==='ArrowUp'){e.preventDefault();stepFrames(10);rotateDial(DDEG*10);}
  if(e.code==='ArrowDown'){e.preventDefault();stepFrames(-10);rotateDial(-DDEG*10);}
});

startOv();
</script>
</body>
