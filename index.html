<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SKI FORM ANALYZER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&display=swap');
:root {
  --bg:#080a0e; --surface:#0f1117; --border:#1a1f2e;
  --accent:#00d4ff; --accent2:#ff3c6e; --accent3:#f5a623;
  --text:#dde2ef; --muted:#3d4560; --panel:#0c0e15;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(8,10,14,.97);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px);}
.logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;background:linear-gradient(90deg,var(--accent),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo span{background:linear-gradient(90deg,var(--accent2),#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.mode-tabs{display:flex;gap:3px;background:var(--surface);padding:3px;border-radius:7px;border:1px solid var(--border);}
.mode-tab{padding:5px 12px;border:none;background:transparent;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:5px;transition:all .18s;text-transform:uppercase;}
.mode-tab.active{background:var(--accent);color:#000;font-weight:700;}

/* MAIN */
.main{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}

/* ── VIDEO + DIAL ROW ── */
.viewer-row{display:flex;gap:8px;align-items:flex-start;}
.videos-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;}

/* video card */
.video-wrapper{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.video-label{position:absolute;top:6px;left:6px;z-index:10;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.label-pro{background:rgba(0,212,255,.12);border:1px solid var(--accent);color:var(--accent);}
.label-you{background:rgba(255,60,110,.12);border:1px solid var(--accent2);color:var(--accent2);}

.video-area{width:100%;aspect-ratio:16/9;background:#040506;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.video-area video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;}
.video-area video.loaded{display:block;}

.drop-zone{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);pointer-events:none;z-index:2;}
.drop-zone.hidden{display:none;}
.drop-icon{width:36px;height:36px;border:2px dashed var(--muted);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;}
.drop-text{font-size:11px;text-align:center;line-height:1.4;}
.drop-text strong{display:block;color:var(--text);font-size:12px;margin-bottom:1px;}
.file-input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:5;}

/* tap-to-play */
.tap-overlay{position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);cursor:pointer;}
.tap-overlay.hidden{display:none;}
.tap-icon{width:44px;height:44px;border-radius:50%;background:rgba(0,212,255,.2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);}

/* overlay view */
.overlay-container{display:none;position:relative;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.overlay-container.active{display:block;}
.overlay-area{width:100%;aspect-ratio:16/9;background:#040506;position:relative;overflow:hidden;cursor:crosshair;touch-action:none;}
.overlay-area canvas{position:absolute;inset:0;width:100%;height:100%;transform-origin:0 0;will-change:transform;}
.overlay-badge{position:absolute;top:6px;left:6px;z-index:20;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:2px 7px;border-radius:3px;background:rgba(0,0,0,.65);border:1px solid var(--accent);color:var(--accent);pointer-events:none;}
.zoom-badge{position:absolute;top:6px;right:6px;z-index:20;font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(0,0,0,.65);border:1px solid var(--accent3);color:var(--accent3);pointer-events:none;display:none;}
.zoom-badge.visible{display:block;}
.zoom-reset-btn{position:absolute;bottom:8px;right:8px;z-index:20;background:rgba(0,0,0,.7);border:1px solid var(--muted);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;cursor:pointer;display:none;}
.zoom-reset-btn.visible{display:block;}

/* ── DIAL COLUMN ── */
.dial-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;padding-top:4px;}
.dial-title{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.dial-wrap{position:relative;width:100px;height:100px;user-select:none;touch-action:none;}
.dial-outer{position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(from 0deg,#1c2438 0deg 5deg,#232d45 5deg 10deg);border:2px solid #28344e;box-shadow:0 0 20px rgba(0,0,0,.9),inset 0 2px 4px rgba(255,255,255,.04);}
.dial-grip{position:absolute;inset:5px;border-radius:50%;border:3px solid transparent;background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.06) 0deg 3deg,transparent 3deg 6deg) border-box;pointer-events:none;z-index:1;}
.dial-ticks{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:1;}
.dial-plate{position:absolute;inset:14px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#2a3550,#1a2238 40%,#10162a 100%);border:1px solid #1e2a42;box-shadow:inset 0 2px 6px rgba(0,0,0,.7);z-index:2;}
.dial-center{position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#00d4ff33,transparent);border:1px solid #00d4ff55;transform:translate(-50%,-50%);z-index:5;pointer-events:none;}
.dial-readout{display:flex;flex-direction:column;align-items:center;gap:1px;}
.dial-frame-num{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--accent);letter-spacing:2px;text-shadow:0 0 8px rgba(0,212,255,.5);}
.dial-frame-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;}
.dial-hint{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0;text-align:center;line-height:1.6;}

/* CONTROLS */
.controls-panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:10px;}
.control-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.control-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;min-width:44px;}
.btn{padding:7px 11px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap;user-select:none;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:.7;}
.btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}

.seek-row{display:flex;align-items:center;gap:8px;width:100%;}
.seek-bar{flex:1;-webkit-appearance:none;height:5px;background:var(--border);border-radius:3px;outline:none;cursor:pointer;}
.seek-bar::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(0,212,255,.5);}
.time-display{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);min-width:80px;text-align:right;}

.speed-btns{display:flex;gap:3px;flex-wrap:wrap;}
.speed-btn{padding:6px 8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;border-radius:5px;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.speed-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08);}

.opacity-row{display:flex;align-items:center;gap:8px;flex:1;}
.opacity-slider{flex:1;-webkit-appearance:none;height:5px;background:linear-gradient(to right,rgba(0,212,255,.8),rgba(255,60,110,.8));border-radius:3px;outline:none;cursor:pointer;}
.opacity-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#fff;border-radius:50%;cursor:pointer;box-shadow:0 0 4px rgba(255,255,255,.4);}
.opacity-val{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);min-width:28px;}

.overlay-controls{display:none;flex-direction:column;gap:8px;}
.overlay-controls.visible{display:flex;}

.sync-indicator{display:flex;align-items:center;gap:5px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.sync-dot.on{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.no-video-msg{font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.divider{border:none;border-top:1px solid var(--border);}
</style>
</head>
<body>

<header>
  <div class="logo">SKI<span>FORM</span></div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('split')" id="tab-split">スプリット</button>
    <button class="mode-tab" onclick="setMode('overlay')" id="tab-overlay">オーバーレイ</button>
  </div>
</header>

<div class="main">

  <!-- ── VIDEO + DIAL ROW ── -->
  <div class="viewer-row">

    <!-- Videos column -->
    <div class="videos-col" id="split-view">
      <!-- PRO -->
      <div class="video-wrapper">
        <div class="video-label label-pro">▶ PRO</div>
        <div class="video-area" id="pro-area">
          <input type="file" class="file-input" accept="video/*" id="pro-file-input">
          <video id="pro-video" playsinline webkit-playsinline preload="metadata" muted></video>
          <div class="drop-zone" id="pro-drop">
            <div class="drop-icon">▶</div>
            <div class="drop-text"><strong>プロの動画を選択</strong>タップして読み込む</div>
          </div>
          <div class="tap-overlay hidden" id="pro-tap">
            <div class="tap-icon">▶</div>
          </div>
        </div>
      </div>
      <!-- YOU -->
      <div class="video-wrapper">
        <div class="video-label label-you">▶ YOU</div>
        <div class="video-area" id="you-area">
          <input type="file" class="file-input" accept="video/*" id="you-file-input">
          <video id="you-video" playsinline webkit-playsinline preload="metadata" muted></video>
          <div class="drop-zone" id="you-drop">
            <div class="drop-icon">◆</div>
            <div class="drop-text"><strong>自分の動画を選択</strong>タップして読み込む</div>
          </div>
          <div class="tap-overlay hidden" id="you-tap">
            <div class="tap-icon">▶</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Overlay column (same position as split) -->
    <div class="videos-col overlay-container" id="overlay-view">
      <div class="overlay-badge">◈ OVERLAY</div>
      <div class="zoom-badge" id="zoom-badge">ZOOM ×1.0</div>
      <button class="zoom-reset-btn" id="zoom-reset-btn" onclick="resetZoom()">✕ リセット</button>
      <div class="overlay-area" id="overlay-area">
        <canvas id="overlay-canvas"></canvas>
      </div>
    </div>

    <!-- DIAL column -->
    <div class="dial-col">
      <div class="dial-title">コマ送り</div>
      <div class="dial-wrap" id="dial-wrap">
        <div class="dial-outer" id="dial-outer"></div>
        <div class="dial-grip"></div>
        <canvas class="dial-ticks" id="dial-ticks" width="100" height="100"></canvas>
        <div class="dial-plate"></div>
        <div class="dial-center"></div>
        <svg style="position:absolute;inset:0;z-index:6;pointer-events:none;overflow:visible" width="100" height="100">
          <defs><filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <line id="svg-needle" x1="50" y1="50" x2="50" y2="18" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
          <circle cx="50" cy="50" r="3" fill="var(--accent)" opacity=".9"/>
        </svg>
      </div>
      <div class="dial-readout">
        <div class="dial-frame-num" id="dial-frame-num">0000</div>
        <div class="dial-frame-label">FRAME</div>
      </div>
      <div class="dial-hint">回転で<br>コマ送り</div>
    </div>

  </div><!-- end viewer-row -->

  <!-- CONTROLS -->
  <div class="controls-panel">

    <!-- Playback -->
    <div class="control-row">
      <span class="control-label">再生</span>
      <button class="btn btn-primary" onclick="playAll()" id="btn-play">▶ 再生</button>
      <button class="btn" onclick="pauseAll()">⏸ 停止</button>
      <button class="btn" onclick="resetAll()">⏮ リセット</button>
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">SYNC OFF</span>
      </div>
    </div>

    <!-- Seek -->
    <div class="seek-row">
      <span class="control-label">位置</span>
      <input type="range" class="seek-bar" id="seek-bar" min="0" max="10000" value="0" oninput="seekTo(this.value)">
      <span class="time-display" id="time-display">0:00 / 0:00</span>
    </div>

    <!-- Speed -->
    <div class="control-row">
      <span class="control-label">速度</span>
      <div class="speed-btns">
        <button class="speed-btn" onclick="setSpeed(0.125)">×1/8</button>
        <button class="speed-btn" onclick="setSpeed(0.25)">×1/4</button>
        <button class="speed-btn" onclick="setSpeed(0.5)">×1/2</button>
        <button class="speed-btn active" onclick="setSpeed(1.0)">×1</button>
        <button class="speed-btn" onclick="setSpeed(2.0)">×2</button>
      </div>
    </div>

    <!-- Sync -->
    <div class="control-row">
      <span class="control-label">同期</span>
      <button class="btn" id="btn-sync" onclick="toggleSync()">同期 OFF</button>
      <span class="no-video-msg" id="sync-hint">（2本の動画を読み込むと有効）</span>
    </div>

    <!-- Overlay opacity -->
    <div class="overlay-controls" id="overlay-controls">
      <hr class="divider">
      <div class="control-row">
        <span class="control-label">透過</span>
        <div class="opacity-row">
          <span style="font-size:9px;color:var(--accent);font-family:'Share Tech Mono'">PRO</span>
          <input type="range" class="opacity-slider" id="opacity-slider" min="0" max="100" value="50" oninput="updateOverlayOpacity(this.value)">
          <span style="font-size:9px;color:var(--accent2);font-family:'Share Tech Mono'">YOU</span>
          <span class="opacity-val" id="opacity-val">50%</span>
        </div>
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);">🔍 ピンチ or スクロールでズーム　ドラッグでパン</div>
    </div>

  </div>
</div>

<script>
// ── Elements ──
const proVideo    = document.getElementById('pro-video');
const youVideo    = document.getElementById('you-video');
const seekBar     = document.getElementById('seek-bar');
const timeDisp    = document.getElementById('time-display');
const syncDot     = document.getElementById('sync-dot');
const syncLabel   = document.getElementById('sync-label');
const btnSync     = document.getElementById('btn-sync');
const canvas      = document.getElementById('overlay-canvas');
const ctx         = canvas.getContext('2d');
const overlayArea = document.getElementById('overlay-area');

let syncEnabled    = false;
let currentMode    = 'split';
let overlayOpacity = 0.5;
let overlayRAF     = null;
let proLoaded      = false;
let youLoaded      = false;
let seekDragging   = false;
const FPS          = 30;

// ── Draw dial ticks ──
(function(){
  const tc = document.getElementById('dial-ticks');
  const tcx = tc.getContext('2d');
  const cx = 50, cy = 50, r = 46;
  for(let i=0;i<60;i++){
    const ang = (i/60)*Math.PI*2 - Math.PI/2;
    const isMajor = i%5===0;
    const len = isMajor ? 7 : 4;
    tcx.beginPath();
    tcx.moveTo(cx+Math.cos(ang)*r, cy+Math.sin(ang)*r);
    tcx.lineTo(cx+Math.cos(ang)*(r-len), cy+Math.sin(ang)*(r-len));
    tcx.strokeStyle = isMajor ? 'rgba(0,212,255,0.5)' : 'rgba(100,120,160,0.3)';
    tcx.lineWidth = isMajor ? 1.5 : 1;
    tcx.stroke();
  }
})();

// ── Zoom/Pan ──
let zoom=1, panX=0, panY=0;
let isPanning=false, panSX=0, panSY=0, panSPX=0, panSPY=0;
let lastPinchDist=null;

function applyTransform(){
  const cw=overlayArea.clientWidth, ch=overlayArea.clientHeight;
  canvas.style.transform=`translate(${(cw/2)*(1-zoom)+panX}px,${(ch/2)*(1-zoom)+panY}px) scale(${zoom})`;
  const b=document.getElementById('zoom-badge'), r=document.getElementById('zoom-reset-btn');
  if(zoom>1.01){b.textContent=`ZOOM ×${zoom.toFixed(1)}`;b.classList.add('visible');r.classList.add('visible');}
  else{b.classList.remove('visible');r.classList.remove('visible');}
}
function clampPan(){
  const cw=overlayArea.clientWidth, ch=overlayArea.clientHeight;
  panX=Math.max(-(cw*(zoom-1)/2),Math.min(cw*(zoom-1)/2,panX));
  panY=Math.max(-(ch*(zoom-1)/2),Math.min(ch*(zoom-1)/2,panY));
}
function resetZoom(){zoom=1;panX=0;panY=0;applyTransform();}

overlayArea.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(1,Math.min(8,zoom*(e.deltaY<0?1.12:1/1.12)));clampPan();applyTransform();},{passive:false});
overlayArea.addEventListener('mousedown',e=>{if(zoom<=1)return;isPanning=true;panSX=e.clientX;panSY=e.clientY;panSPX=panX;panSPY=panY;overlayArea.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=panSPX+(e.clientX-panSX);panY=panSPY+(e.clientY-panSY);clampPan();applyTransform();});
window.addEventListener('mouseup',()=>{isPanning=false;overlayArea.style.cursor=zoom>1?'grab':'crosshair';});
overlayArea.addEventListener('touchstart',e=>{
  if(e.touches.length===2){lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  else if(e.touches.length===1&&zoom>1){isPanning=true;panSX=e.touches[0].clientX;panSY=e.touches[0].clientY;panSPX=panX;panSPY=panY;}
},{passive:true});
overlayArea.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lastPinchDist){zoom=Math.max(1,Math.min(8,zoom*(d/lastPinchDist)));clampPan();applyTransform();}lastPinchDist=d;}
  else if(e.touches.length===1&&isPanning){panX=panSPX+(e.touches[0].clientX-panSX);panY=panSPY+(e.touches[0].clientY-panSY);clampPan();applyTransform();}
},{passive:false});
overlayArea.addEventListener('touchend',e=>{if(e.touches.length<2)lastPinchDist=null;if(e.touches.length===0)isPanning=false;});

// ── Load video ──
// iOS requires user gesture for each video separately
document.getElementById('pro-file-input').addEventListener('change', function(){ loadVideo('pro', this); });
document.getElementById('you-file-input').addEventListener('change', function(){ loadVideo('you', this); });

function loadVideo(which, input){
  const file=input.files[0]; if(!file)return;
  const vid = which==='pro' ? proVideo : youVideo;
  const drop = document.getElementById(which+'-drop');
  const tap  = document.getElementById(which+'-tap');

  // Revoke old URL
  if(vid._objURL) URL.revokeObjectURL(vid._objURL);
  vid._objURL = URL.createObjectURL(file);

  vid.src = vid._objURL;
  vid.load();
  vid.classList.add('loaded');
  drop.classList.add('hidden');

  vid.onloadedmetadata = () => {
    if(which==='pro') proLoaded=true; else youLoaded=true;
    if(proLoaded&&youLoaded) document.getElementById('sync-hint').textContent='';
    if(currentMode==='overlay'&&proLoaded&&youLoaded) setupOverlayCanvas();
    // Show tap-to-play so user can unlock the video with a gesture
    tap.classList.remove('hidden');
  };
  vid.ontimeupdate = () => { if(!seekDragging) updateSeekBar(); };
}

// Tap to play — user gesture unlocks iOS autoplay restriction
document.getElementById('pro-tap').addEventListener('click', function(){
  proVideo.play().then(()=>{
    this.classList.add('hidden');
    proVideo.pause(); // pause after unlock — let user use the play button
    proVideo.currentTime = 0;
  }).catch(()=>{});
});
document.getElementById('you-tap').addEventListener('click', function(){
  youVideo.play().then(()=>{
    this.classList.add('hidden');
    youVideo.pause();
    youVideo.currentTime = 0;
  }).catch(()=>{});
});

// ── Mode ──
function setMode(mode){
  currentMode=mode;
  document.getElementById('tab-split').classList.toggle('active',mode==='split');
  document.getElementById('tab-overlay').classList.toggle('active',mode==='overlay');
  document.getElementById('split-view').style.display=mode==='split'?'flex':'none';
  document.getElementById('overlay-view').classList.toggle('active',mode==='overlay');
  document.getElementById('overlay-controls').classList.toggle('visible',mode==='overlay');
  if(mode==='overlay'){if(proLoaded&&youLoaded)setupOverlayCanvas();startOverlayLoop();}
  else stopOverlayLoop();
}

// ── Overlay canvas ──
function setupOverlayCanvas(){
  canvas.width  = proLoaded?(proVideo.videoWidth||1280):1280;
  canvas.height = proLoaded?(proVideo.videoHeight||720):720;
}

function drawContain(vid, alpha){
  if(!vid.videoWidth||!vid.videoHeight) return;
  ctx.globalAlpha=alpha;
  const cw=canvas.width, ch=canvas.height, vw=vid.videoWidth, vh=vid.videoHeight;
  const scale=Math.min(cw/vw,ch/vh);
  const dw=vw*scale, dh=vh*scale;
  ctx.drawImage(vid,(cw-dw)/2,(ch-dh)/2,dw,dh);
}

function startOverlayLoop(){
  if(overlayRAF)return;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(proLoaded) drawContain(proVideo,overlayOpacity);
    if(youLoaded) drawContain(youVideo,1-overlayOpacity);
    ctx.globalAlpha=1;
    overlayRAF=requestAnimationFrame(draw);
  }
  overlayRAF=requestAnimationFrame(draw);
}
function stopOverlayLoop(){if(overlayRAF){cancelAnimationFrame(overlayRAF);overlayRAF=null;}}
function updateOverlayOpacity(v){overlayOpacity=v/100;document.getElementById('opacity-val').textContent=v+'%';}

// ── Playback ──
function playAll(){
  const p1 = proLoaded ? proVideo.play() : Promise.resolve();
  const p2 = youLoaded ? youVideo.play() : Promise.resolve();
  Promise.all([p1,p2]).then(()=>{
    document.getElementById('btn-play').textContent='▶ 再生中';
  }).catch(()=>{});
}
function pauseAll(){
  if(proLoaded) proVideo.pause();
  if(youLoaded) youVideo.pause();
  document.getElementById('btn-play').textContent='▶ 再生';
}
function resetAll(){
  pauseAll();
  if(proLoaded) proVideo.currentTime=0;
  if(youLoaded) youVideo.currentTime=0;
  seekBar.value=0; updateTimeDisplay(0,0); setDialFrame(0);
}

// ── Seek ──
function seekTo(val){
  seekDragging=true;
  const r=val/10000;
  if(proLoaded) proVideo.currentTime=proVideo.duration*r;
  if(youLoaded) youVideo.currentTime=youVideo.duration*r;
  seekDragging=false;
  const vid=proLoaded?proVideo:youVideo;
  if(vid&&vid.duration) setDialFrame(vid.currentTime*FPS);
}
function updateSeekBar(){
  const vid=proLoaded?proVideo:(youLoaded?youVideo:null);
  if(!vid||!vid.duration)return;
  seekBar.value=(vid.currentTime/vid.duration)*10000;
  updateTimeDisplay(vid.currentTime,vid.duration);
  setDialFrame(vid.currentTime*FPS);
}
function updateTimeDisplay(c,d){
  const f=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  timeDisp.textContent=`${f(c)} / ${f(d||0)}`;
}

// ── Speed ──
function setSpeed(s){
  if(proLoaded) proVideo.playbackRate=s;
  if(youLoaded) youVideo.playbackRate=s;
  const map={'×1/8':0.125,'×1/4':0.25,'×1/2':0.5,'×1':1,'×2':2};
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',map[b.textContent]===s));
}

// ── Sync ──
function toggleSync(){
  if(!proLoaded||!youLoaded)return;
  syncEnabled=!syncEnabled;
  btnSync.textContent=syncEnabled?'同期 ON':'同期 OFF';
  btnSync.classList.toggle('active',syncEnabled);
  syncDot.classList.toggle('on',syncEnabled);
  syncLabel.textContent=syncEnabled?'SYNC ON':'SYNC OFF';
  if(syncEnabled){
    if(proVideo.duration&&youVideo.duration)
      youVideo.currentTime=youVideo.duration*(proVideo.currentTime/proVideo.duration);
    proVideo.addEventListener('timeupdate',onProTU);
  } else {
    proVideo.removeEventListener('timeupdate',onProTU);
  }
}
function onProTU(){
  if(!syncEnabled||!proVideo.duration||!youVideo.duration)return;
  const t=youVideo.duration*(proVideo.currentTime/proVideo.duration);
  if(Math.abs(youVideo.currentTime-t)>0.15) youVideo.currentTime=t;
  if(proVideo.paused&&!youVideo.paused) youVideo.pause();
  if(!proVideo.paused&&youVideo.paused) youVideo.play().catch(()=>{});
}

// ── Frame step ──
function stepFrames(n){
  const dt=n/FPS;
  pauseAll();
  if(proLoaded) proVideo.currentTime=Math.max(0,Math.min(proVideo.duration,proVideo.currentTime+dt));
  if(youLoaded) youVideo.currentTime=Math.max(0,Math.min(youVideo.duration,youVideo.currentTime+dt));
  const vid=proLoaded?proVideo:(youLoaded?youVideo:null);
  if(vid&&vid.duration){
    seekBar.value=(vid.currentTime/vid.duration)*10000;
    updateTimeDisplay(vid.currentTime,vid.duration);
    setDialFrame(vid.currentTime*FPS);
  }
}

// ── Rotary dial ──
let dialAngle=0, dialAccum=0, dialDragging=false, dialLastAng=0;
const DIAL_DEG_PER_FRAME=5;
const DIAL_CX=50, DIAL_CY=50;

function getPointerAngle(px,py){
  const r=document.getElementById('dial-outer').getBoundingClientRect();
  return Math.atan2(py-(r.top+r.height/2), px-(r.left+r.width/2))*180/Math.PI;
}
function rotateDial(delta){
  dialAngle+=delta; dialAccum+=delta;
  const frames=Math.trunc(dialAccum/DIAL_DEG_PER_FRAME);
  if(frames!==0){ stepFrames(frames); dialAccum-=frames*DIAL_DEG_PER_FRAME; }
  const needle=document.getElementById('svg-needle');
  const rad=(dialAngle-90)*Math.PI/180;
  needle.setAttribute('x2',DIAL_CX+Math.cos(rad)*32);
  needle.setAttribute('y2',DIAL_CY+Math.sin(rad)*32);
}
function setDialFrame(n){
  document.getElementById('dial-frame-num').textContent=String(Math.round(n)).padStart(4,'0');
}

const dialOuter=document.getElementById('dial-outer');
dialOuter.addEventListener('mousedown',e=>{e.preventDefault();dialDragging=true;dialLastAng=getPointerAngle(e.clientX,e.clientY);dialAccum=0;});
window.addEventListener('mousemove',e=>{
  if(!dialDragging)return;
  const ang=getPointerAngle(e.clientX,e.clientY);
  let d=ang-dialLastAng; if(d>180)d-=360; if(d<-180)d+=360;
  dialLastAng=ang; rotateDial(d);
});
window.addEventListener('mouseup',()=>{dialDragging=false;});

dialOuter.addEventListener('touchstart',e=>{
  e.preventDefault();dialDragging=true;
  dialLastAng=getPointerAngle(e.touches[0].clientX,e.touches[0].clientY);dialAccum=0;
},{passive:false});
window.addEventListener('touchmove',e=>{
  if(!dialDragging)return;
  const ang=getPointerAngle(e.touches[0].clientX,e.touches[0].clientY);
  let d=ang-dialLastAng; if(d>180)d-=360; if(d<-180)d+=360;
  dialLastAng=ang; rotateDial(d);
},{passive:true});
window.addEventListener('touchend',()=>{dialDragging=false;});

// ── Keyboard ──
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;
  if(e.code==='Space'){e.preventDefault();(proLoaded&&!proVideo.paused)||(youLoaded&&!youVideo.paused)?pauseAll():playAll();}
  if(e.code==='ArrowRight'){e.preventDefault();stepFrames(1);rotateDial(DIAL_DEG_PER_FRAME);}
  if(e.code==='ArrowLeft'){e.preventDefault();stepFrames(-1);rotateDial(-DIAL_DEG_PER_FRAME);}
  if(e.code==='ArrowUp'){e.preventDefault();stepFrames(10);rotateDial(DIAL_DEG_PER_FRAME*10);}
  if(e.code==='ArrowDown'){e.preventDefault();stepFrames(-10);rotateDial(-DIAL_DEG_PER_FRAME*10);}
});

startOverlayLoop();
</script>
</body>
