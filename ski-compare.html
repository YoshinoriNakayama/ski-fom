<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SKI FORM ANALYZER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #080a0e;
  --surface: #0f1117;
  --border: #1a1f2e;
  --accent: #00d4ff;
  --accent2: #ff3c6e;
  --accent3: #f5a623;
  --text: #dde2ef;
  --muted: #3d4560;
  --panel: #0c0e15;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,10,14,0.97);
  position: sticky; top:0; z-index:200;
  backdrop-filter: blur(12px);
}
.logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 26px; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--accent) 0%, #fff 60%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo span {
  background: linear-gradient(90deg, var(--accent2), #ff8c42);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.mode-tabs {
  display:flex; gap:3px;
  background: var(--surface); padding:3px;
  border-radius:7px; border:1px solid var(--border);
}
.mode-tab {
  padding:5px 13px; border:none; background:transparent;
  color:var(--muted); font-family:'Share Tech Mono',monospace;
  font-size:11px; letter-spacing:1px; cursor:pointer;
  border-radius:5px; transition:all .18s; text-transform:uppercase;
}
.mode-tab.active { background:var(--accent); color:#000; font-weight:700; }
.mode-tab:hover:not(.active) { color:var(--text); background:var(--border); }

.main { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }

/* Split view */
.videos-container { display:flex; flex-direction:column; gap:8px; }
.video-wrapper {
  position:relative; background:var(--surface);
  border:1px solid var(--border); border-radius:10px; overflow:hidden;
}
.video-label {
  position:absolute; top:8px; left:8px; z-index:10;
  font-family:'Share Tech Mono',monospace; font-size:10px;
  letter-spacing:2px; padding:3px 9px; border-radius:4px; text-transform:uppercase;
}
.label-pro { background:rgba(0,212,255,.12); border:1px solid var(--accent); color:var(--accent); }
.label-you { background:rgba(255,60,110,.12); border:1px solid var(--accent2); color:var(--accent2); }

.video-area {
  width:100%; aspect-ratio:16/9;
  background:#040506;
  display:flex; align-items:center; justify-content:center;
  position:relative; cursor:pointer; overflow:hidden;
}
.video-area video { width:100%; height:100%; object-fit:contain; display:none; }
.video-area video.loaded { display:block; }

.drop-zone {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  color:var(--muted); pointer-events:none;
}
.drop-zone.hidden { display:none; }
.drop-icon {
  width:44px; height:44px; border:2px dashed var(--muted);
  border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;
}
.drop-text { font-size:12px; text-align:center; line-height:1.5; }
.drop-text strong { display:block; color:var(--text); font-size:13px; margin-bottom:2px; }
.file-input { position:absolute; inset:0; opacity:0; cursor:pointer; }

/* Overlay view */
.overlay-container {
  display:none; position:relative;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; overflow:hidden;
}
.overlay-container.active { display:block; }

.overlay-area {
  width:100%; aspect-ratio:16/9;
  background:#040506; position:relative;
  overflow:hidden; cursor:crosshair;
  touch-action:none;
}
.overlay-area canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  transform-origin:0 0;
  will-change:transform;
}

.overlay-badge {
  position:absolute; top:8px; left:8px; z-index:20;
  font-family:'Share Tech Mono',monospace; font-size:10px;
  letter-spacing:2px; padding:3px 9px; border-radius:4px;
  background:rgba(0,0,0,.65); border:1px solid var(--accent); color:var(--accent);
  pointer-events:none;
}
.zoom-badge {
  position:absolute; top:8px; right:8px; z-index:20;
  font-family:'Share Tech Mono',monospace; font-size:10px;
  letter-spacing:1px; padding:3px 9px; border-radius:4px;
  background:rgba(0,0,0,.65); border:1px solid var(--accent3); color:var(--accent3);
  pointer-events:none; display:none;
}
.zoom-badge.visible { display:block; }
.zoom-reset-btn {
  position:absolute; bottom:10px; right:10px; z-index:20;
  background:rgba(0,0,0,.7); border:1px solid var(--muted);
  color:var(--muted); font-family:'Share Tech Mono',monospace;
  font-size:10px; padding:4px 10px; border-radius:4px;
  cursor:pointer; display:none; transition:all .15s;
}
.zoom-reset-btn:hover { border-color:var(--accent3); color:var(--accent3); }
.zoom-reset-btn.visible { display:block; }

/* Controls */
.controls-panel {
  background:var(--panel); border:1px solid var(--border);
  border-radius:10px; padding:14px;
  display:flex; flex-direction:column; gap:12px;
}
.control-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.control-label {
  font-family:'Share Tech Mono',monospace; font-size:10px;
  letter-spacing:1px; color:var(--muted); text-transform:uppercase; min-width:52px;
}
.btn {
  padding:7px 12px; border:1px solid var(--border);
  background:var(--surface); color:var(--text);
  font-family:'Share Tech Mono',monospace; font-size:11px;
  letter-spacing:1px; cursor:pointer; border-radius:6px;
  transition:all .15s; white-space:nowrap; user-select:none;
}
.btn:hover { border-color:var(--accent); color:var(--accent); }
.btn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
.btn-primary:hover { background:#fff; border-color:#fff; color:#000; }

.seek-row { display:flex; align-items:center; gap:8px; width:100%; }
.seek-bar {
  flex:1; -webkit-appearance:none; height:4px;
  background:var(--border); border-radius:2px; outline:none; cursor:pointer;
}
.seek-bar::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  background:var(--accent); border-radius:50%; cursor:pointer;
  box-shadow:0 0 6px rgba(0,212,255,.5);
}
.time-display {
  font-family:'Share Tech Mono',monospace; font-size:11px;
  color:var(--muted); min-width:88px; text-align:right;
}
.speed-btns { display:flex; gap:4px; }
.speed-btn {
  padding:5px 9px; border:1px solid var(--border);
  background:var(--surface); color:var(--muted);
  font-family:'Share Tech Mono',monospace; font-size:10px;
  cursor:pointer; border-radius:5px; transition:all .15s; user-select:none;
}
.speed-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,.08); }

.opacity-row { display:flex; align-items:center; gap:8px; flex:1; }
.opacity-slider {
  flex:1; -webkit-appearance:none; height:4px;
  background:linear-gradient(to right,rgba(0,212,255,.8),rgba(255,60,110,.8));
  border-radius:2px; outline:none; cursor:pointer;
}
.opacity-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  background:#fff; border-radius:50%; cursor:pointer; box-shadow:0 0 4px rgba(255,255,255,.4);
}
.opacity-val { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent); min-width:30px; }

.overlay-controls { display:none; flex-direction:column; gap:10px; }
.overlay-controls.visible { display:flex; }

.sync-indicator {
  display:flex; align-items:center; gap:5px;
  font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); margin-left:auto;
}
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); }
.sync-dot.on { background:#00ff88; box-shadow:0 0 6px #00ff88; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

.no-video-msg { font-size:11px; color:var(--muted); font-family:'Share Tech Mono',monospace; }
.divider { border:none; border-top:1px solid var(--border); margin:2px 0; }

/* ── ROTARY DIAL ── */
.dial-section {
  display:flex; flex-direction:column; align-items:center; gap:8px; padding:10px 0 4px;
}
.dial-title {
  font-family:'Share Tech Mono',monospace; font-size:10px;
  letter-spacing:2px; color:var(--muted); text-transform:uppercase;
}

.dial-wrap {
  position:relative; width:150px; height:150px;
  user-select:none; touch-action:none;
}

/* Outer decorative ring */
.dial-outer {
  position:absolute; inset:0; border-radius:50%;
  background:
    repeating-conic-gradient(
      from 0deg,
      #1c2438 0deg 5deg,
      #232d45 5deg 10deg
    );
  border:2px solid #28344e;
  box-shadow:
    0 0 30px rgba(0,0,0,.9),
    0 0 0 1px #0d1020,
    inset 0 2px 4px rgba(255,255,255,.04),
    inset 0 -2px 8px rgba(0,0,0,.6);
}

/* Tick marks via pseudo — drawn via canvas inside JS */
.dial-ticks {
  position:absolute; inset:0; border-radius:50%;
  pointer-events:none; z-index:1;
}

/* Middle plate */
.dial-plate {
  position:absolute; inset:18px; border-radius:50%;
  background: radial-gradient(circle at 40% 35%,
    #2a3550 0%, #1a2238 40%, #10162a 100%);
  border:1px solid #1e2a42;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,.7),
    inset 0 -1px 2px rgba(255,255,255,.04);
  z-index:2;
}

/* Knurling grip ring */
.dial-grip {
  position:absolute; inset:8px; border-radius:50%;
  border:3px solid transparent;
  background:
    repeating-conic-gradient(
      from 0deg,
      rgba(255,255,255,.06) 0deg 3deg,
      transparent 3deg 6deg
    ) border-box;
  pointer-events:none; z-index:1;
}

/* Indicator dot on the outer ring */
.dial-indicator {
  position:absolute; top:4px; left:50%; transform:translateX(-50%);
  width:6px; height:6px; border-radius:50%;
  background:var(--accent);
  box-shadow: 0 0 8px var(--accent);
  z-index:10; pointer-events:none;
  transform-origin:50% 71px; /* radius from center */
}

/* Center marker */
.dial-center {
  position:absolute; top:50%; left:50%;
  width:10px; height:10px; border-radius:50%;
  background: radial-gradient(circle, #00d4ff44, transparent);
  border:1px solid #00d4ff66;
  transform:translate(-50%,-50%);
  z-index:5; pointer-events:none;
}

/* Frame readout */
.dial-readout {
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.dial-frame-num {
  font-family:'Share Tech Mono',monospace; font-size:18px;
  color:var(--accent); letter-spacing:2px;
  text-shadow:0 0 10px rgba(0,212,255,.6);
}
.dial-frame-label {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  color:var(--muted); letter-spacing:3px;
}
.dial-hint {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  color:var(--muted); letter-spacing:1px; text-align:center; line-height:1.7;
}
</style>
</head>
<body>

<header>
  <div class="logo">SKI<span>FORM</span></div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('split')" id="tab-split">スプリット</button>
    <button class="mode-tab" onclick="setMode('overlay')" id="tab-overlay">オーバーレイ</button>
  </div>
</header>

<div class="main">

  <!-- SPLIT -->
  <div class="videos-container" id="split-view">
    <div class="video-wrapper">
      <div class="video-label label-pro">▶ PRO</div>
      <div class="video-area">
        <input type="file" class="file-input" accept="video/*" onchange="loadVideo('pro',this)">
        <video id="pro-video" playsinline></video>
        <div class="drop-zone" id="pro-drop">
          <div class="drop-icon">▶</div>
          <div class="drop-text"><strong>プロの動画を選択</strong>タップしてファイルを読み込む</div>
        </div>
      </div>
    </div>
    <div class="video-wrapper">
      <div class="video-label label-you">▶ YOU</div>
      <div class="video-area">
        <input type="file" class="file-input" accept="video/*" onchange="loadVideo('you',this)">
        <video id="you-video" playsinline></video>
        <div class="drop-zone" id="you-drop">
          <div class="drop-icon">◆</div>
          <div class="drop-text"><strong>自分の動画を選択</strong>タップしてファイルを読み込む</div>
        </div>
      </div>
    </div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay-container" id="overlay-view">
    <div class="overlay-badge">◈ OVERLAY</div>
    <div class="zoom-badge" id="zoom-badge">ZOOM ×1.0</div>
    <button class="zoom-reset-btn" id="zoom-reset-btn" onclick="resetZoom()">✕ ズームリセット</button>
    <div class="overlay-area" id="overlay-area">
      <canvas id="overlay-canvas"></canvas>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-panel">

    <div class="control-row">
      <span class="control-label">再生</span>
      <div style="display:flex;gap:5px;">
        <button class="btn btn-primary" onclick="playAll()" id="btn-play">▶ 再生</button>
        <button class="btn" onclick="pauseAll()">⏸ 停止</button>
        <button class="btn" onclick="resetAll()">⏮ リセット</button>
      </div>
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">SYNC OFF</span>
      </div>
    </div>

    <div class="seek-row">
      <span class="control-label">位置</span>
      <input type="range" class="seek-bar" id="seek-bar" min="0" max="10000" value="0" oninput="seekTo(this.value)">
      <span class="time-display" id="time-display">0:00 / 0:00</span>
    </div>

    <div class="control-row">
      <span class="control-label">速度</span>
      <div class="speed-btns">
        <button class="speed-btn" onclick="setSpeed(0.125)">×1/8</button>
        <button class="speed-btn" onclick="setSpeed(0.25)">×1/4</button>
        <button class="speed-btn" onclick="setSpeed(0.5)">×1/2</button>
        <button class="speed-btn active" onclick="setSpeed(1.0)">×1</button>
        <button class="speed-btn" onclick="setSpeed(2.0)">×2</button>
      </div>
    </div>

    <div class="control-row">
      <span class="control-label">同期</span>
      <button class="btn" id="btn-sync" onclick="toggleSync()">同期 OFF</button>
      <span class="no-video-msg" id="sync-hint">（2本の動画を読み込むと有効）</span>
    </div>

    <div class="overlay-controls" id="overlay-controls">
      <hr class="divider">
      <div class="control-row">
        <span class="control-label">透過</span>
        <div class="opacity-row">
          <span style="font-size:10px;color:var(--accent);font-family:'Share Tech Mono'">PRO</span>
          <input type="range" class="opacity-slider" id="opacity-slider" min="0" max="100" value="50" oninput="updateOverlayOpacity(this.value)">
          <span style="font-size:10px;color:var(--accent2);font-family:'Share Tech Mono'">YOU</span>
          <span class="opacity-val" id="opacity-val">50%</span>
        </div>
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);padding-left:4px;">
        🔍 ピンチ or スクロールでズーム　／　ドラッグでパン
      </div>
    </div>

    <hr class="divider">

    <!-- DIAL -->
    <div class="dial-section">
      <div class="dial-title">◈ コマ送りダイヤル</div>
      <div class="dial-wrap" id="dial-wrap">
        <div class="dial-outer" id="dial-outer"></div>
        <div class="dial-grip"></div>
        <canvas class="dial-ticks" id="dial-ticks" width="150" height="150"></canvas>
        <div class="dial-plate"></div>
        <div class="dial-center"></div>
        <!-- SVG needle drawn on top of plate -->
        <svg style="position:absolute;inset:0;z-index:6;pointer-events:none;overflow:visible" width="150" height="150">
          <line id="svg-needle"
            x1="75" y1="75" x2="75" y2="26"
            stroke="var(--accent)" stroke-width="2.5"
            stroke-linecap="round"
            filter="url(#glow)"
          />
          <circle cx="75" cy="75" r="4" fill="var(--accent)" opacity="0.9"/>
          <defs>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
        </svg>
      </div>
      <div class="dial-readout">
        <div class="dial-frame-num" id="dial-frame-num">0000</div>
        <div class="dial-frame-label">FRAME</div>
      </div>
      <div class="dial-hint">ドラッグで回転 → コマ送り<br>右回転: 進む　左回転: 戻る<br>キーボード ← → でも操作可</div>
    </div>

  </div>
</div>

<script>
// ──────────────────────────────────────────────
// Core elements
// ──────────────────────────────────────────────
const proVideo    = document.getElementById('pro-video');
const youVideo    = document.getElementById('you-video');
const seekBar     = document.getElementById('seek-bar');
const timeDisp    = document.getElementById('time-display');
const syncDot     = document.getElementById('sync-dot');
const syncLabel   = document.getElementById('sync-label');
const btnSync     = document.getElementById('btn-sync');
const canvas      = document.getElementById('overlay-canvas');
const ctx         = canvas.getContext('2d');
const overlayArea = document.getElementById('overlay-area');

let syncEnabled    = false;
let currentMode    = 'split';
let overlayOpacity = 0.5;
let overlayRAF     = null;
let proLoaded      = false;
let youLoaded      = false;
let seekDragging   = false;
const FPS          = 30; // assumed frame rate

// ──────────────────────────────────────────────
// Draw tick marks on dial canvas
// ──────────────────────────────────────────────
(function drawTicks() {
  const tc  = document.getElementById('dial-ticks');
  const tcx = tc.getContext('2d');
  const cx  = 75, cy = 75, r = 70;
  for (let i = 0; i < 60; i++) {
    const ang  = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isMajor = i % 5 === 0;
    const len  = isMajor ? 10 : 5;
    const x1   = cx + Math.cos(ang) * r;
    const y1   = cy + Math.sin(ang) * r;
    const x2   = cx + Math.cos(ang) * (r - len);
    const y2   = cy + Math.sin(ang) * (r - len);
    tcx.beginPath();
    tcx.moveTo(x1, y1);
    tcx.lineTo(x2, y2);
    tcx.strokeStyle = isMajor ? 'rgba(0,212,255,0.5)' : 'rgba(100,120,160,0.35)';
    tcx.lineWidth   = isMajor ? 1.5 : 1;
    tcx.stroke();
  }
})();

// ──────────────────────────────────────────────
// Zoom / Pan (overlay)
// ──────────────────────────────────────────────
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panSX = 0, panSY = 0, panSPX = 0, panSPY = 0;
let lastPinchDist = null;

function applyTransform() {
  const cw = overlayArea.clientWidth, ch = overlayArea.clientHeight;
  const tx = (cw / 2) * (1 - zoom) + panX;
  const ty = (ch / 2) * (1 - zoom) + panY;
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${zoom})`;

  const badge = document.getElementById('zoom-badge');
  const rst   = document.getElementById('zoom-reset-btn');
  if (zoom > 1.01) {
    badge.textContent = `ZOOM ×${zoom.toFixed(1)}`;
    badge.classList.add('visible');
    rst.classList.add('visible');
  } else {
    badge.classList.remove('visible');
    rst.classList.remove('visible');
  }
}

function clampPan() {
  const cw = overlayArea.clientWidth, ch = overlayArea.clientHeight;
  const mx = (cw * (zoom - 1)) / 2, my = (ch * (zoom - 1)) / 2;
  panX = Math.max(-mx, Math.min(mx, panX));
  panY = Math.max(-my, Math.min(my, panY));
}

function resetZoom() { zoom = 1; panX = 0; panY = 0; applyTransform(); }

// Mouse wheel
overlayArea.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.max(1, Math.min(8, zoom * (e.deltaY < 0 ? 1.12 : 1/1.12)));
  clampPan(); applyTransform();
}, { passive: false });

// Mouse pan
overlayArea.addEventListener('mousedown', e => {
  if (zoom <= 1) return;
  isPanning = true;
  panSX = e.clientX; panSY = e.clientY; panSPX = panX; panSPY = panY;
  overlayArea.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = panSPX + (e.clientX - panSX); panY = panSPY + (e.clientY - panSY);
  clampPan(); applyTransform();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  overlayArea.style.cursor = zoom > 1 ? 'grab' : 'crosshair';
});

// Touch pinch / pan
overlayArea.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  } else if (e.touches.length === 1 && zoom > 1) {
    isPanning = true;
    panSX = e.touches[0].clientX; panSY = e.touches[0].clientY; panSPX = panX; panSPY = panY;
  }
}, { passive: true });
overlayArea.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastPinchDist) { zoom = Math.max(1, Math.min(8, zoom * (d / lastPinchDist))); clampPan(); applyTransform(); }
    lastPinchDist = d;
  } else if (e.touches.length === 1 && isPanning) {
    panX = panSPX + (e.touches[0].clientX - panSX); panY = panSPY + (e.touches[0].clientY - panSY);
    clampPan(); applyTransform();
  }
}, { passive: false });
overlayArea.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = null;
  if (e.touches.length === 0) isPanning = false;
});

// ──────────────────────────────────────────────
// Video load
// ──────────────────────────────────────────────
function loadVideo(which, input) {
  const file = input.files[0]; if (!file) return;
  const vid  = which === 'pro' ? proVideo : youVideo;
  const drop = document.getElementById(which + '-drop');
  vid.src = URL.createObjectURL(file);
  vid.load(); vid.classList.add('loaded'); drop.classList.add('hidden');
  vid.onloadedmetadata = () => {
    if (which === 'pro') proLoaded = true; else youLoaded = true;
    if (proLoaded && youLoaded) document.getElementById('sync-hint').textContent = '';
    if (currentMode === 'overlay' && proLoaded && youLoaded) setupOverlayCanvas();
  };
  vid.ontimeupdate = () => { if (!seekDragging) updateSeekBar(); };
}

// ──────────────────────────────────────────────
// Mode
// ──────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('tab-split').classList.toggle('active', mode === 'split');
  document.getElementById('tab-overlay').classList.toggle('active', mode === 'overlay');
  document.getElementById('split-view').style.display = mode === 'split' ? 'flex' : 'none';
  document.getElementById('overlay-view').classList.toggle('active', mode === 'overlay');
  document.getElementById('overlay-controls').classList.toggle('visible', mode === 'overlay');
  if (mode === 'overlay') { if (proLoaded && youLoaded) setupOverlayCanvas(); startOverlayLoop(); }
  else stopOverlayLoop();
}

// ──────────────────────────────────────────────
// Overlay canvas
// ──────────────────────────────────────────────
function setupOverlayCanvas() {
  canvas.width  = proLoaded ? (proVideo.videoWidth  || 1280) : 1280;
  canvas.height = proLoaded ? (proVideo.videoHeight || 720)  : 720;
}
function startOverlayLoop() {
  if (overlayRAF) return;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (proLoaded)  { ctx.globalAlpha = overlayOpacity;     ctx.drawImage(proVideo, 0,0,canvas.width,canvas.height); }
    if (youLoaded)  { ctx.globalAlpha = 1 - overlayOpacity; ctx.drawImage(youVideo, 0,0,canvas.width,canvas.height); }
    ctx.globalAlpha = 1;
    overlayRAF = requestAnimationFrame(draw);
  }
  overlayRAF = requestAnimationFrame(draw);
}
function stopOverlayLoop() { if (overlayRAF) { cancelAnimationFrame(overlayRAF); overlayRAF = null; } }
function updateOverlayOpacity(v) { overlayOpacity = v/100; document.getElementById('opacity-val').textContent = v+'%'; }

// ──────────────────────────────────────────────
// Playback
// ──────────────────────────────────────────────
function playAll()  {
  if (proLoaded) proVideo.play();
  if (youLoaded) youVideo.play();
  document.getElementById('btn-play').textContent = '▶ 再生中';
}
function pauseAll() {
  if (proLoaded) proVideo.pause();
  if (youLoaded) youVideo.pause();
  document.getElementById('btn-play').textContent = '▶ 再生';
}
function resetAll() {
  pauseAll();
  if (proLoaded) proVideo.currentTime = 0;
  if (youLoaded) youVideo.currentTime = 0;
  seekBar.value = 0; updateTimeDisplay(0,0); setDialFrame(0);
}

// ──────────────────────────────────────────────
// Seek
// ──────────────────────────────────────────────
function seekTo(val) {
  seekDragging = true;
  const r = val / 10000;
  if (proLoaded) proVideo.currentTime = proVideo.duration * r;
  if (youLoaded) youVideo.currentTime = youVideo.duration * r;
  seekDragging = false;
  const vid = proLoaded ? proVideo : youVideo;
  if (vid && vid.duration) setDialFrame(vid.currentTime * FPS);
}
function updateSeekBar() {
  const vid = proLoaded ? proVideo : (youLoaded ? youVideo : null);
  if (!vid || !vid.duration) return;
  seekBar.value = (vid.currentTime / vid.duration) * 10000;
  updateTimeDisplay(vid.currentTime, vid.duration);
  setDialFrame(vid.currentTime * FPS);
}
function updateTimeDisplay(c, d) {
  const f = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  timeDisp.textContent = `${f(c)} / ${f(d||0)}`;
}

// ──────────────────────────────────────────────
// Speed
// ──────────────────────────────────────────────
function setSpeed(s) {
  if (proLoaded) proVideo.playbackRate = s;
  if (youLoaded) youVideo.playbackRate = s;
  const map = {'×1/8':0.125,'×1/4':0.25,'×1/2':0.5,'×1':1,'×2':2};
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', map[b.textContent]===s));
}

// ──────────────────────────────────────────────
// Sync
// ──────────────────────────────────────────────
function toggleSync() {
  if (!proLoaded || !youLoaded) return;
  syncEnabled = !syncEnabled;
  btnSync.textContent = syncEnabled ? '同期 ON' : '同期 OFF';
  btnSync.classList.toggle('active', syncEnabled);
  syncDot.classList.toggle('on', syncEnabled);
  syncLabel.textContent = syncEnabled ? 'SYNC ON' : 'SYNC OFF';
  if (syncEnabled) {
    if (proVideo.duration && youVideo.duration)
      youVideo.currentTime = youVideo.duration * (proVideo.currentTime / proVideo.duration);
    proVideo.addEventListener('timeupdate', onProTU);
  } else {
    proVideo.removeEventListener('timeupdate', onProTU);
  }
}
function onProTU() {
  if (!syncEnabled || !proVideo.duration || !youVideo.duration) return;
  const t = youVideo.duration * (proVideo.currentTime / proVideo.duration);
  if (Math.abs(youVideo.currentTime - t) > 0.15) youVideo.currentTime = t;
  if (proVideo.paused && !youVideo.paused) youVideo.pause();
  if (!proVideo.paused && youVideo.paused)  youVideo.play();
}

// ──────────────────────────────────────────────
// Frame step
// ──────────────────────────────────────────────
function stepFrames(n) {
  const dt = n / FPS;
  pauseAll();
  if (proLoaded) proVideo.currentTime = Math.max(0, Math.min(proVideo.duration, proVideo.currentTime + dt));
  if (youLoaded) youVideo.currentTime = Math.max(0, Math.min(youVideo.duration, youVideo.currentTime + dt));
  const vid = proLoaded ? proVideo : (youLoaded ? youVideo : null);
  if (vid && vid.duration) {
    seekBar.value = (vid.currentTime / vid.duration) * 10000;
    updateTimeDisplay(vid.currentTime, vid.duration);
    setDialFrame(vid.currentTime * FPS);
  }
}

// ──────────────────────────────────────────────
// ROTARY DIAL
// ──────────────────────────────────────────────
let dialAngle    = 0;   // current needle angle in degrees
let dialAccum    = 0;   // sub-frame accumulator
let dialDragging = false;
let dialLastAng  = 0;
const DIAL_DEG_PER_FRAME = 5; // degrees per 1 frame advance
const DIAL_CX = 75, DIAL_CY = 75; // center of 150×150 dial

function getPointerAngle(px, py) {
  const wrap = document.getElementById('dial-outer').getBoundingClientRect();
  const cx   = wrap.left + wrap.width  / 2;
  const cy   = wrap.top  + wrap.height / 2;
  return Math.atan2(py - cy, px - cx) * 180 / Math.PI;
}

function rotateDial(delta) {
  // delta in degrees
  dialAngle += delta;
  dialAccum += delta;

  const frames = Math.trunc(dialAccum / DIAL_DEG_PER_FRAME);
  if (frames !== 0) {
    stepFrames(frames);
    dialAccum -= frames * DIAL_DEG_PER_FRAME;
  }

  // Rotate SVG needle around center (75,75)
  const needle = document.getElementById('svg-needle');
  const rad    = (dialAngle - 90) * Math.PI / 180; // -90 so 0° = top
  const len    = 49; // needle length
  needle.setAttribute('x2', DIAL_CX + Math.cos(rad) * len);
  needle.setAttribute('y2', DIAL_CY + Math.sin(rad) * len);
}

function setDialFrame(frameNum) {
  document.getElementById('dial-frame-num').textContent = String(Math.round(frameNum)).padStart(4,'0');
}

// Mouse
const dialOuter = document.getElementById('dial-outer');
dialOuter.addEventListener('mousedown', e => {
  e.preventDefault();
  dialDragging = true;
  dialLastAng  = getPointerAngle(e.clientX, e.clientY);
  dialAccum    = 0;
});
window.addEventListener('mousemove', e => {
  if (!dialDragging) return;
  const ang   = getPointerAngle(e.clientX, e.clientY);
  let delta   = ang - dialLastAng;
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;
  dialLastAng = ang;
  rotateDial(delta);
});
window.addEventListener('mouseup', () => { dialDragging = false; });

// Touch
dialOuter.addEventListener('touchstart', e => {
  e.preventDefault();
  dialDragging = true;
  dialLastAng  = getPointerAngle(e.touches[0].clientX, e.touches[0].clientY);
  dialAccum    = 0;
}, { passive: false });
window.addEventListener('touchmove', e => {
  if (!dialDragging) return;
  const ang   = getPointerAngle(e.touches[0].clientX, e.touches[0].clientY);
  let delta   = ang - dialLastAng;
  if (delta >  180) delta -= 360;
  if (delta < -180) delta += 360;
  dialLastAng = ang;
  rotateDial(delta);
}, { passive: true });
window.addEventListener('touchend', () => { dialDragging = false; });

// ──────────────────────────────────────────────
// Keyboard
// ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.code === 'Space')      { e.preventDefault(); (proLoaded&&!proVideo.paused)||(youLoaded&&!youVideo.paused)?pauseAll():playAll(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); stepFrames(1);   rotateDial( DIAL_DEG_PER_FRAME); }
  if (e.code === 'ArrowLeft')  { e.preventDefault(); stepFrames(-1);  rotateDial(-DIAL_DEG_PER_FRAME); }
  if (e.code === 'ArrowUp')    { e.preventDefault(); stepFrames(10);  rotateDial( DIAL_DEG_PER_FRAME*10); }
  if (e.code === 'ArrowDown')  { e.preventDefault(); stepFrames(-10); rotateDial(-DIAL_DEG_PER_FRAME*10); }
});

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
startOverlayLoop();
</script>
</body>
</html>
